<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการสั่งซื้อ | PanderX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/orders.css">
</head>
<body>
    <div class="water-drop-bg drop-1"></div>
    <div class="water-drop-bg drop-2"></div>
    <div id="toastContainer"></div>

    <!-- SIDEBAR -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
    <aside id="sidebarDrawer" class="sidebar-drawer">
        <div class="sidebar-header">
            <div class="sidebar-logo"><div class="sidebar-logo-icon">P</div><span class="sidebar-logo-text">PanderX</span></div>
            <button class="sidebar-close-btn" onclick="closeSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div id="sidebarUserStrip" class="sidebar-user-strip" style="display:none;">
            <div id="sidebarAvatar" class="sidebar-avatar">U</div>
            <div class="sidebar-user-info"><div id="sidebarUsername" class="sidebar-username">Username</div><div class="sidebar-balance"><svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 9l10 13 10-13-10-7z"/></svg><span id="sidebarBalance">0</span> บาท</div></div>
        </div>
        <nav class="sidebar-nav">
            <p class="sidebar-section-label">เมนูหลัก</p>
            <a href="./index.html" class="sidebar-item"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></span>หน้าหลัก</a>
            <a href="./homerent.html" class="sidebar-item"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg></span>เช่าเว็บไซต์</a>
            <a href="./upgrade.html" class="sidebar-item"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></span>อัปเกรด<span class="sidebar-badge">NEW</span></a>
        </nav>
        <div class="sidebar-divider"></div>
        <div id="sidebarAuthGuest" class="sidebar-auth-section" style="display:none;">
            <p class="sidebar-section-label">บัญชีผู้ใช้</p>
            <button onclick="goToLogin();closeSidebar();" class="sidebar-auth-btn sidebar-login-btn">เข้าสู่ระบบ</button>
            <button onclick="goToRegister();closeSidebar();" class="sidebar-auth-btn sidebar-register-btn">สมัครสมาชิก</button>
        </div>
        <div id="sidebarAuthUser" class="sidebar-auth-section" style="display:none;">
            <p class="sidebar-section-label">บัญชีของฉัน</p>
            <a href="./profile.html" class="sidebar-item"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></span>โปรไฟล์</a>
            <a href="./orders.html" class="sidebar-item active"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></span>ประวัติการสั่งซื้อ</a>
            <a href="./settings.html" class="sidebar-item"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></span>ตั้งค่า</a>
            <button onclick="handleLogout()" class="sidebar-item sidebar-logout"><span class="sidebar-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></span>ออกจากระบบ</button>
        </div>
        <div class="sidebar-version">PanderX v2.0 © 2026</div>
    </aside>

    <!-- NAVBAR -->
    <nav class="navbar glass-panel-white px-4 py-3.5 flex items-center justify-between">
        <button id="hamburgerBtn" class="hamburger-btn" onclick="toggleSidebar(event)" aria-expanded="false"><span class="hamburger-bar"></span><span class="hamburger-bar"></span><span class="hamburger-bar"></span></button>
        <a href="./index.html" class="navbar-brand">PanderX</a>
        <div class="flex items-center gap-2">
            <div id="userProfile" style="display:none;" class="profile-dropdown-container">
                <button class="profile-trigger" id="profileTrigger" onclick="toggleDropdown(event)">
                    <div class="balance-pill hidden sm:flex"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 9l10 13 10-13-10-7z"/></svg><span id="userBalance">0</span></div>
                    <div class="avatar-glass" id="userAvatar" style="width:34px;height:34px;font-size:0.85rem;">U</div>
                    <svg class="w-3.5 h-3.5 text-slate-400" id="dropdownArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div class="glass-dropdown" id="profileDropdown">
                    <div class="p-3 border-b border-slate-100">
                        <div class="flex items-center gap-3"><div class="avatar-glass" id="dropdownAvatar" style="width:40px;height:40px;">U</div><div><div class="font-bold text-slate-800 text-sm" id="dropdownName">User</div></div></div>
                        <div class="mt-2 pt-2 border-t border-slate-100 flex justify-between"><span class="text-xs text-slate-500">ยอดเงิน</span><div class="balance-pill"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 9l10 13 10-13-10-7z"/></svg><span id="dropdownBalance">0</span></div></div>
                    </div>
                    <div class="py-1.5">
                        <a href="./profile.html" class="dropdown-item"><svg class="dropdown-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>โปรไฟล์</a>
                        <div class="dropdown-item logout-item" onclick="handleLogout()"><svg class="dropdown-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>ออกจากระบบ</div>
                    </div>
                </div>
            </div>
            <a href="./login.html" id="loginBtn" class="btn-liquid px-4 py-2 text-sm" style="display:none;">เข้าสู่ระบบ</a>
        </div>
    </nav>

    <main class="w-full max-w-2xl mx-auto px-4 pb-20">
        <div class="flex items-center justify-between mb-1">
            <h1 class="text-2xl font-bold text-slate-800">ประวัติการสั่งซื้อ</h1>
            <span id="orderCount" class="text-sm text-slate-500"></span>
        </div>
        <p class="text-slate-500 text-sm mb-5">รายการคำสั่งซื้อและสถานะทั้งหมด</p>

        <!-- Filter pills -->
        <div class="flex gap-2 mb-5 overflow-x-auto pb-1" style="scrollbar-width:none;">
            <button class="filter-pill active" onclick="setFilter('all',this)">ทั้งหมด</button>
            <button class="filter-pill" onclick="setFilter('pending',this)">รอดำเนินการ</button>
            <button class="filter-pill" onclick="setFilter('approved',this)">อนุมัติแล้ว</button>
            <button class="filter-pill" onclick="setFilter('rejected',this)">ถูกปฏิเสธ</button>
        </div>

        <!-- Orders list -->
        <div id="ordersList">
            <!-- Loading skeleton -->
            <div class="order-card animate-pulse" style="padding-left:20px;">
                <div style="display:flex;gap:12px;align-items:center;">
                    <div style="width:60px;height:60px;background:#f1f5f9;border-radius:10px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div style="height:14px;background:#f1f5f9;border-radius:6px;width:60%;margin-bottom:8px;"></div><div style="height:11px;background:#f1f5f9;border-radius:6px;width:40%;"></div></div>
                </div>
            </div>
            <div class="order-card animate-pulse" style="padding-left:20px;">
                <div style="display:flex;gap:12px;align-items:center;">
                    <div style="width:60px;height:60px;background:#f1f5f9;border-radius:10px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div style="height:14px;background:#f1f5f9;border-radius:6px;width:60%;margin-bottom:8px;"></div><div style="height:11px;background:#f1f5f9;border-radius:6px;width:40%;"></div></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        var currentFilter='all';
        var allOrders=[];
        function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-pill').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderOrders();}
        function renderOrders(){
            var list=document.getElementById('ordersList');
            var filtered=allOrders.filter(function(o){return currentFilter==='all'||o.status===currentFilter;});
            if(filtered.length===0){list.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><p style="font-weight:700;color:#374151;margin-bottom:4px;">ไม่มีรายการ</p><p style="color:#94a3b8;font-size:0.875rem;">ยังไม่มีประวัติการสั่งซื้อ</p><a href="./homerent.html" class="btn-liquid mt-4 inline-block px-6 py-2 text-sm">สั่งซื้อเลย</a></div>';return;}
            var statusMap={pending:{label:'รอดำเนินการ',cls:'status-pending'},approved:{label:'อนุมัติแล้ว',cls:'status-approved'},rejected:{label:'ถูกปฏิเสธ',cls:'status-rejected'}};
            list.innerHTML=filtered.map(function(o){
                var s=statusMap[o.status]||statusMap.pending;
                var dt=o.createdAt?.toDate?o.createdAt.toDate():o.createdAt?new Date(o.createdAt):new Date();
                var dtStr=dt.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
                var imgHtml=o.productImageUrl?'<img src="'+o.productImageUrl+'" onerror="this.style.display=\'none\'">':'🌐';
                return '<div class="order-card '+o.status+'"><div style="display:flex;gap:12px;align-items:flex-start;"><div class="order-img">'+imgHtml+'</div><div style="flex:1;min-width:0;"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;"><div style="font-weight:700;color:#1e293b;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+o.productName+'</div><div class="order-status '+s.cls+'"><span class="status-dot"></span>'+s.label+'</div></div><div style="font-size:0.78rem;color:#64748b;margin-bottom:4px;">'+dtStr+'</div><div style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:0.8rem;color:#94a3b8;">'+o.durationDays+' วัน</div><div style="font-weight:800;color:#0284c7;font-size:1rem;">฿'+Number(o.totalAmount||0).toLocaleString()+'</div></div></div></div></div>';
            }).join('');
        }
        function toggleSidebar(e){if(e)e.stopPropagation();var d=document.getElementById('sidebarDrawer'),o=document.getElementById('sidebarOverlay'),b=document.getElementById('hamburgerBtn'),open=d.classList.toggle('open');o.classList.toggle('open',open);b.classList.toggle('active',open);b.setAttribute('aria-expanded',open);document.body.style.overflow=open?'hidden':'';}
        function closeSidebar(){['sidebarDrawer','sidebarOverlay'].forEach(function(id){document.getElementById(id)?.classList.remove('open');});var b=document.getElementById('hamburgerBtn');if(b){b.classList.remove('active');b.setAttribute('aria-expanded','false');}document.body.style.overflow='';}
        function toggleDropdown(e){if(e)e.stopPropagation();var d=document.getElementById('profileDropdown'),a=document.getElementById('dropdownArrow'),open=d.classList.toggle('active');if(a)a.style.transform=open?'rotate(180deg)':'rotate(0deg)';}
        document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeSidebar();document.getElementById('profileDropdown')?.classList.remove('active');}});
        document.addEventListener('click',function(e){var d=document.getElementById('profileDropdown');if(d?.classList.contains('active')&&!d.contains(e.target)&&!document.getElementById('profileTrigger')?.contains(e.target)){d.classList.remove('active');}});
        window.goToLogin=function(){window.location.href='./login.html';};
        window.goToRegister=function(){window.location.href='./register.html';};
        window.showToast=function(msg,type){var c=document.getElementById('toastContainer');if(!c)return;var t=document.createElement('div');t.className='toast '+(type||'info');var ic={success:'✓',error:'✕',info:'ℹ',warning:'⚠'},col={success:'#10b981',error:'#ef4444',info:'#38bdf8',warning:'#f59e0b'};t.style.borderLeftColor=col[type]||col.info;t.innerHTML='<span style="color:'+(col[type]||col.info)+';font-weight:bold;font-size:1.1rem;">'+(ic[type]||'ℹ')+'</span><span style="color:#1e293b;font-weight:500;">'+msg+'</span>';c.appendChild(t);requestAnimationFrame(function(){t.classList.add('show');});setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},400);},3000);};
        window.handleLogout=async function(){try{if(window._signOut)await window._signOut();showToast('ออกจากระบบแล้ว','success');setTimeout(function(){window.location.href='./index.html';},700);}catch(e){showToast('เกิดข้อผิดพลาด','error');}};
    </script>

    <script type="module" src="js/frontend/orders.js"></script>
</body>
</html>
